<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>明細一覧</title>

    <!--ファビコン-->
    <link rel="icon" type="image/png" href="favicon.png">

    <!-- CSS連携 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/breakdown.css">

</head>

<body>

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">

        <div class="menu-box ms-auto">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div class="menu-list" id="menu">
                <a href="index.html">新規追加</a>
                <a href="breakdown.html">明細一覧</a>
                <a href="summary.html">集計</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">

        <h2 class="text-center mb-4">明細一覧</h2>

        <!-- 戻るボタン -->
        <button class="btn btn-secondary"
                onclick="location.href='index.html'"
                style="position: fixed; bottom: 20px; right: 20px;">
            戻る
        </button>
    </div>

    <!-- 検索 -->
    <div class="row mb-3">
        <input type="date" id="startDate" class="form-control col">
        <input type="date" id="endDate" class="form-control col">

        <select id="searchType" class="form-control col">
            <option value="">すべて</option>
            <option value="収入">収入</option>
            <option value="支出">支出</option>
        </select>

        <select id="searchCategory" class="form-control col">
            <option value="">すべて</option>
            <option value="家賃">家賃</option>
            <option value="食費">食費</option>
            <option value="交通費">交通費</option>
            <option value="光熱費">光熱費</option>
            <option value="日用品">日用品</option>
            <option value="医療費">医療費</option>
            <option value="ローン">ローン</option>
            <option value="交際費">交際費</option>
            <option value="雑費">雑費</option>
            <option value="給与">給与</option>
            <option value="臨時収入">臨時収入</option>
        </select>

        <button class="btn btn-primary col" onclick="loadData()">検索</button>
    </div>

    <!-- テーブル -->
    <div class="table-box">
        <table class="table">
            <thead>
                <tr>
                    <th>日付</th>
                    <th>内容</th>
                    <th>区分</th>
                    <th>カテゴリ</th>
                    <th>金額</th>
                    <th>メモ</th>
                    <th>削除</th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>
    </div>

    <!-- ✅ 横並び＆色デフォルト -->
    <div class="d-flex justify-content-center gap-5 mt-4 text-center">

        <div>
            <div>収入合計</div>
            <div id="totalIncome" style="font-size:24px; font-weight:bold;">
                0
            </div>
        </div>

        <div>
            <div>支出合計</div>
            <div id="totalExpense" style="font-size:24px; font-weight:bold;">
                0
            </div>
        </div>

        <div>
            <div>差額</div>
            <div id="balance" style="font-size:28px; font-weight:bold;">
                0
            </div>
        </div>

    </div>

    <!--JS連携-->
    <script src="js/common.js"></script>
    <script src="js/breakdown.js"></script>

</body>
</html>
