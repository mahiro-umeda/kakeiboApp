<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>明細一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .table-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>

<body>

    <div class="container mt-4">

        <h2 class="text-center mb-4">明細一覧</h2>

        <!-- 戻るボタン -->
        <button class="btn btn-secondary"
                onclick="location.href='index.html'"
                style="position: fixed; bottom: 20px; right: 20px;">
            戻る</button>
        </div>

        <!-- 検索 -->
        <div class="row mb-3">
            <input type="date" id="startDate" class="form-control col">
            <input type="date" id="endDate" class="form-control col">

            <select id="searchType" class="form-control col">
                <option value="">すべて</option>
                <option value="収入">収入</option>
                <option value="支出">支出</option>
            </select>

            <select id="searchCategory" class="form-control col">
                <option value="">すべて</option>
                <option value="家賃">家賃</option>
                <option value="食費">食費</option>
                <option value="交通費">交通費</option>
                <option value="光熱費">光熱費</option>
                <option value="日用品">日用品</option>
                <option value="医療費">医療費</option>
                <option value="ローン">ローン</option>
                <option value="交際費">交際費</option>
                <option value="雑費">雑費</option>
                <option value="給与">給与</option>
                <option value="臨時収入">臨時収入</option>
            </select>

            <button class="btn btn-primary col" onclick="loadData()">検索</button>
        </div>

        <!-- テーブル -->
        <div class="table-box">
            <table class="table">
                <thead>
                    <tr>
                        <th>日付</th>
                        <th>内容</th>
                        <th>区分</th>
                        <th>カテゴリ</th>
                        <th>金額</th>
                        <th>メモ</th>
                        <th>削除</th>
                    </tr>
                </thead>
                <tbody id="list"></tbody>
            </table>
        </div>

        <!-- ✅ 横並び＆色デフォルト -->
        <div class="d-flex justify-content-center gap-5 mt-4 text-center">

            <div>
                <div>収入合計</div>
                <div id="totalIncome" style="font-size:24px; font-weight:bold;">
                    0
                </div>
            </div>

            <div>
                <div>支出合計</div>
                <div id="totalExpense" style="font-size:24px; font-weight:bold;">
                    0
                </div>
            </div>

            <div>
                <div>差額</div>
                <div id="balance" style="font-size:28px; font-weight:bold;">
                    0
                </div>
            </div>

        </div>

    </div>

    <script>
        async function loadData() {

            const params = new URLSearchParams();

            const type = document.getElementById("searchType").value;
            const cat = document.getElementById("searchCategory").value;
            const s = document.getElementById("startDate").value;
            const e = document.getElementById("endDate").value;

            if (type) params.append("type", type);
            if (cat) params.append("category", cat);
            if (s) params.append("startDate", s);
            if (e) params.append("endDate", e);

            const res = await fetch("/api/Kakeibo?" + params.toString());
            const data = await res.json();

            const list = document.getElementById("list");
            list.innerHTML = "";

            let totalIncome = 0;
            let totalExpense = 0;

            data.forEach(x => {

                const money = Number(x.money);

                if (x.type === "収入") {
                    totalIncome += money;
                } else {
                    totalExpense += money;
                }

                list.innerHTML += `
<tr>
<td>${x.date}</td>
<td>${x.name}</td>
<td>${x.type}</td>
<td>${x.category}</td>
<td>${x.money}</td>
<td>${x.memo}</td>
<td><button class="btn btn-danger" onclick="del(${x.id})">削除</button></td>
</tr>`;
            });

            document.getElementById("totalIncome").innerText = totalIncome;
            document.getElementById("totalExpense").innerText = totalExpense;
            document.getElementById("balance").innerText = totalIncome - totalExpense;
        }

        async function del(id) {
            if (!confirm("削除する？")) return;

            await fetch("/api/Kakeibo/" + id, { method: "DELETE" });
            loadData();
        }

        // 初期表示
        loadData();
    </script>

</body>
</html>
