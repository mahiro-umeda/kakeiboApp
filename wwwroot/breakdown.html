<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>明細一覧</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/common.css" rel="stylesheet">
    <link href="css/breakdown.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <h1 class="mt-4 text-center">明細一覧</h1>

        <!-- 検索カード -->
        <div class="card mt-4 shadow-sm">
            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-3">
                        <input type="date" id="startDate" class="form-control">
                    </div>

                    <div class="col-md-3">
                        <input type="date" id="endDate" class="form-control">
                    </div>

                    <div class="col-md-2">
                        <select id="searchType" class="form-select">
                            <option value="">すべて</option>
                            <option value="収入">収入</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>

                    <div class="col-md-2">
                        <select id="searchCategory" class="form-select">
                            <option value="">すべて</option>
                            <option value="家賃">家賃</option>
                            <option value="食費">食費</option>
                            <option value="交通費">交通費</option>
                            <option value="光熱費">光熱費</option>
                            <option value="日用品">日用品</option>
                            <option value="医療費">医療費</option>
                            <option value="ローン">ローン</option>
                            <option value="交際費">交際費</option>
                            <option value="雑費">雑費</option>
                            <option value="給与">給与</option>
                            <option value="臨時収入">臨時収入</option>
                        </select>
                    </div>

                    <div class="col-md-2 text-end">
                        <button class="btn btn-primary w-100" onclick="loadData()">検索</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- 一覧 -->
        <table class="table table-striped mt-4">
            <thead class="table-dark">
                <tr>
                    <th>日付</th>
                    <th>内容</th>
                    <th>区分</th>
                    <th>カテゴリ</th>
                    <th>金額</th>
                    <th>メモ</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="list"></tbody>
        </table>

        <!-- 戻る -->
        <div class="text-center mt-3">
            <a href="index.html" class="btn btn-secondary">戻る</a>
        </div>



        <div class="text-center mt-3">
            <a href="summary.html" class="btn btn-success">集計を見る</a>
        </div>

    </div>

    <script src="js/common.js"></script>
    <script src="js/breakdown.js"></script>

</body>
</html>
