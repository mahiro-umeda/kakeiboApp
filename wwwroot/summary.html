<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>集計</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f7fa;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-top: 30px;
            text-align: center;
        }

        #pieChart {
            max-width: 400px;
            margin: auto;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2 class="center mt-4">カテゴリ別支出割合</h2>

        <div class="text-end mt-3">
            <div style="position: fixed; right: 20px; bottom: 20px;">
                <button class="btn btn-secondary" onclick="location.href='breakdown.html'">戻る</button>
            </div>

            <div class="box">
                <canvas id="pieChart"></canvas>
            </div>

        </div>

    <script>
        async function loadChart() {

            const res = await fetch("/api/Kakeibo");
            const data = await res.json();

            const categoryTotals = {};
            let total = 0;

            // 支出のみ集計
            data.forEach(x => {

                if (x.type === "支出") {

                    const money = Number(x.money);
                    total += money;

                    if (!categoryTotals[x.category]) {
                        categoryTotals[x.category] = 0;
                    }

                    categoryTotals[x.category] += money;
                }
            });

            const labels = Object.keys(categoryTotals);
            const values = Object.values(categoryTotals);

            const ctx = document.getElementById("pieChart");

            new Chart(ctx, {
                type: "pie",
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: [
                            "#ff6384",
                            "#36a2eb",
                            "#ffce56",
                            "#4bc0c0",
                            "#9966ff",
                            "#ff9f40",
                            "#66ff66",
                            "#ff6666"
                        ]
                    }]
                },
                options: {
                    plugins: {
                        legend: {
                            position: "bottom"
                        }
                    }
                }
            });
        }

        loadChart();
    </script>

</body>
</html>
