<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>集計</title>

    <!--ファビコン-->
    <link rel="icon" type="image/png" href="favicon.png">

    <!--CSS連携-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/summary.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #f5f7fa;
        }

        .title {
            text-align: center;
            margin-top: 40px;
            font-weight: bold;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            margin: 40px auto;
            max-width: 900px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        #pieChart {
            max-width: 350px;
            margin: auto;
        }

        /* 棒グラフ */
        #barChart {
            width: 100%;
            height: 400px;
        }

        .back-btn {
            position: fixed;
            right: 20px;
            bottom: 20px;
        }

        /* メニュー */
        .menu-box {
            position: relative;
        }

        .menu-list {
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            min-width: 150px;
            display: none;
        }

            .menu-list a {
                display: block;
                padding: 10px;
                text-decoration: none;
                color: black;
            }

                .menu-list a:hover {
                    background: #f0f0f0;
                }

        .menu-btn {
            cursor: pointer;
            color: white;
            padding: 8px 12px;
            font-size: 20px;
        }
    </style>
</head>

<body>

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <div class="menu-box ms-auto">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div class="menu-list" id="menu">
                <a href="index.html">新規追加</a>
                <a href="breakdown.html">明細一覧</a>
                <a href="summary.html">集計</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <h2 class="title">カテゴリ別支出割合</h2>

        <!-- 円グラフ -->
        <div class="box">
            <canvas id="pieChart"></canvas>
        </div>

        <h2 class="title">月別収支</h2>

        <!-- 棒グラフ -->
        <div class="box">
            <canvas id="barChart"></canvas>
        </div>

    </div>

    <!-- 戻るボタン -->
    <div class="back-btn">
        <button class="btn btn-secondary" onclick="location.href='breakdown.html'">
            戻る
        </button>
    </div>

    <script>

        let pieChart;
        let barChart;

        /* メニュー */
        function toggleMenu() {
            const menu = document.getElementById("menu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }

        document.addEventListener("click", function (e) {
            const menu = document.getElementById("menu");
            const btn = document.querySelector(".menu-btn");

            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.style.display = "none";
            }
        });

        /* グラフ */
        async function loadCharts() {

            const res = await fetch("/api/Kakeibo");
            const data = await res.json();

            /* 円グラフ */
            const categoryTotals = {};

            data.forEach(x => {
                if (x.type === "支出") {
                    const money = Number(x.money);

                    if (!categoryTotals[x.category]) {
                        categoryTotals[x.category] = 0;
                    }
                    categoryTotals[x.category] += money;
                }
            });

            const pieLabels = Object.keys(categoryTotals);
            const pieValues = Object.values(categoryTotals);

            if (pieChart) pieChart.destroy();

            pieChart = new Chart(document.getElementById("pieChart"), {
                type: "pie",
                data: {
                    labels: pieLabels,
                    datasets: [{
                        data: pieValues,
                        backgroundColor: [
                            "#ff6384", "#36a2eb", "#ffce56", "#4bc0c0",
                            "#9966ff", "#ff9f40", "#66ff66", "#ff6666"
                        ]
                    }]
                },
                options: {
                    plugins: {
                        legend: { position: "bottom" }
                    }
                }
            });


            const monthlyIncome = Array(12).fill(0);
            const monthlyExpense = Array(12).fill(0);

            data.forEach(x => {
                const date = new Date(x.date);
                const month = date.getMonth();
                const money = Number(x.money);

                if (x.type === "収入") {
                    monthlyIncome[month] += money;
                } else {
                    monthlyExpense[month] += money;
                }
            });

            const labels = [
                "1月", "2月", "3月", "4月", "5月", "6月",
                "7月", "8月", "9月", "10月", "11月", "12月"
            ];

            if (barChart) barChart.destroy();

            barChart = new Chart(document.getElementById("barChart"), {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: "収入",
                            data: monthlyIncome,
                            backgroundColor: "#36a2eb"
                        },
                        {
                            label: "支出",
                            data: monthlyExpense,
                            backgroundColor: "#ff6384"
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: "top"
                        }
                    },
                    scales: {
                        x: {
                            stacked: false
                        },
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }

        loadCharts();

    </script>

</body>
</html>
