<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>集計</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/summary.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/setting.css">

    <!-- フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!--カレンダー-->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>
</head>

<body>

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <label class="toggle-button-4">
            <input type="checkbox" id="darkModeSwitch" onchange="toggleDarkMode()" />
        </label>

        <div class="menu-box ms-auto d-flex align-items-center gap-2">

            <!-- ハンバーガー -->
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <!-- メニュー -->
            <div class="menu-list" id="menu">
                <a href="index.html">✒新規追加</a>
                <a href="breakdown.html">📄明細一覧</a>
                <a href="summary.html">📊集計</a>
                <a href="setting.html">⚙設定</a>
            </div>

        </div>

    </nav>

    <div class="container">

        <h2 class="title">カテゴリ別支出割合</h2>

        <!-- ⭐ 月検索 -->
        <div class="text-center mb-4">
            <input type="month" id="monthFilter" class="form-control d-inline w-auto">
            <button class="btn btn-primary ms-2" onclick="loadCharts()">検索</button>
        </div>

        <!-- 円グラフ -->
        <div class="box">
            <canvas id="pieChart"></canvas>
        </div>

        <h2 class="title">月別収支</h2>

        <!-- 棒グラフ -->
        <div class="box">
            <canvas id="barChart"></canvas>
        </div>

        <!--カレンダー-->
        <div class="box">
            <h2 class="title">カレンダー</h2>
            <div id="calendar"></div>
        </div>

    </div>

    <!-- 戻る -->
    <div class="back-btn">
        <button class="btn btn-secondary" onclick="location.href='index.html'">
            戻る
        </button>
    </div>

    <!-- JS -->
    <script src="js/common.js"></script>
    <script src="js/summary.js"></script>

</body>
</html>
