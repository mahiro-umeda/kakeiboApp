<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>集計</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/summary.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

    <nav class="navbar navbar-dark bg-primary px-3">
        <div class="menu-box ms-auto">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div class="menu-list" id="menu">
                <a href="index.html">✒新規追加</a>
                <a href="breakdown.html">📄明細一覧</a>
                <a href="summary.html">📊集計</a>
            </div>
        </div>
    </nav>

    <div class="container">

        <h2 class="title">カテゴリ別支出割合</h2>

        <!-- ⭐ 月検索 -->
        <div class="text-center mb-3">
            <input type="month" id="monthFilter" class="form-control w-25 d-inline">
            <button class="btn btn-primary" onclick="loadCharts()">検索</button>
        </div>

        <div class="box">
            <canvas id="pieChart"></canvas>
        </div>

        <h2 class="title">月別収支</h2>

        <div class="box">
            <canvas id="barChart"></canvas>
        </div>

    </div>

    <div class="back-btn">
        <button class="btn btn-secondary" onclick="location.href='breakdown.html'">
            戻る
        </button>
    </div>

    <script src="js/common.js"></script>
    <script src="js/summary.js"></script>

</body>
</html>
