<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>Wallet Keeper</title>

    <!--ファビコン-->
    <link rel="icon" type="image/png" href="favicon.png">

    <!--bootstrap-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!--CSS連携-->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/darkmode.css">
    <link rel="stylesheet" href="css/setting.css">

    <!-- フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>

<body>
    

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <label class="toggle-button-4">
            <input type="checkbox" id="darkModeSwitch" onchange="toggleDarkMode()" />
        </label>

        <div class="menu-box ms-auto d-flex align-items-center gap-2">

            <!-- ハンバーガー -->
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <!-- メニュー -->
            <div class="menu-list" id="menu">
                <a href="index.html">✒新規追加</a>
                <a href="breakdown.html">📄明細一覧</a>
                <a href="summary.html">📊集計</a>
                <a href="setting.html">⚙設定</a>
            </div>

        </div>
    </nav>

    <!-- タイトル -->
    <div class="title">Wa<span>ll</span>et <span2>K</span2><span3>eeper</span3></div>

    <!-- フォーム -->
    <div class="wrapper">
        <div class="form-card">


            <form id="kakeiboForm">
                <div class="row g-3">

                    <div class="col-md-2">
                        <input id="name" class="form-control" placeholder="内容" required>  <!-- required は理論属性　フォーム-->
                    </div>

                    <div class="col-md-2">
                        <input id="money" type="number" class="form-control" placeholder="金額" required min="1">
                    </div>

                    <div class="col-md-2">
                        <select id="type" class="form-select">
                            <option value="支出">支出</option>
                            <option value="収入">収入</option>
                        </select>
                    </div>

                    <div class="col-md-2">

                            <select id="category" class="form-select">
                            <option value="🏠家賃">🏠 家賃</option>
                            <option value="🍎食費">🍎 食費</option>
                            <option value="🚗交通費">🚗 交通費</option>
                            <option value="💡光熱費">💡 光熱費</option>
                            <option value="🛒日用品">🛒 日用品</option>
                            <option value="🏥医療費">🏥 医療費</option>
                            <option value="💳ローン">💳 ローン</option>
                            <option value="🎉交際費">🎉 交際費</option>
                            <option value="📝雑費">📝 雑費</option>
                            <option value="💰給与">💰 給与</option>
                            <option value="🎁臨時収入">🎁 臨時収入</option>

                        </select>
                    </div>

                    <div class="col-md-2">
                        <input id="date" type="date" class="form-control" required>
                    </div>

                    <div class="col-md-2">
                        <input id="memo" class="form-control" placeholder="メモ">
                    </div>

                </div>

                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">登録</button>
                </div>
            </form>
            <div id="message" class="alert alert-success" style="display:none;"></div>

        </div>
    </div>

    <!-- トースト -->
    <div class="position-fixed top-0 start-50 translate-middle-x p-3" style="z-index: 1055;">
        <div id="successToast" class="toast text-bg-success border-0" data-bs-delay="2000">
            <div class="toast-body d-flex justify-content-center align-items-center text-center" style="min-height: 60px;">
                登録完了！
            </div>
        </div>
    </div>
    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/common.js"></script>
    <script src="js/index.js"></script>

</body>
</html>
