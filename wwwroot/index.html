<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container">
        <h1 class="mt-4 text-center">家計簿</h1>

        <!-- カード化 -->
        <div class="card mt-4 shadow-sm">
            <div class="card-body">

                <div class="row g-3">

                    <div class="col-md-6">
                        <input id="name" class="form-control" placeholder="内容">
                    </div>

                    <div class="col-md-3">
                        <input id="money" type="number" class="form-control" placeholder="金額">
                    </div>

                    <div class="col-md-3">
                        <select id="type" class="form-select">
                            <option value="収入">収入</option>
                            <option value="支出">支出</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <select id="category" class="form-select">
                            <option value="家賃">家賃</option>
                            <option value="食費">食費</option>
                            <option value="交通費">交通費</option>
                            <option value="光熱費">光熱費</option>
                            <option value="日用品">日用品</option>
                            <option value="医療費">医療費</option>
                            <option value="ローン">ローン</option>
                            <option value="交際費">交際費</option>
                            <option value="雑費">雑費</option>
                            <option value="給与">給与</option>
                            <option value="臨時収入">臨時収入</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <input id="date" type="date" class="form-control">
                    </div>

                    <div class="col-md-4">
                        <input id="memo" class="form-control" placeholder="メモ">
                    </div>

                    <div class="col-12 text-end">
                        <button class="btn btn-success px-4" onclick="add()">登録</button>
                    </div>

                </div>
            </div>
        </div>

        <!-- 遷移ボタン -->
        <div class="text-center mt-4">
            <a href="breakdown.html" class="btn btn-primary btn-lg">一覧を見る</a>
        </div>

    </div>

    <script>
        async function add() {
            const data = {
                name: document.getElementById("name").value,
                money: parseInt(document.getElementById("money").value),
                type: document.getElementById("type").value,
                category: document.getElementById("category").value,
                date: document.getElementById("date").value,
                memo: document.getElementById("memo").value
            };

            await fetch("/api/Kakeibo", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("登録完了！");
        }
    </script>

</body>
</html>
