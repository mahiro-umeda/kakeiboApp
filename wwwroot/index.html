<!DOCTYPE html>
<html lang="ja" data-bs-theme="light">

<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>

    <link rel="icon" type="image/png" href="favicon.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="backcolor">

    <nav class="navbar navbar-dark bg-primary px-3">
        <div class="form-check form-switch text-light ms-2">
            <input class="form-check-input" type="checkbox" id="darkModeSwitch" onclick="toggleDarkMode()">
            <label class="form-check-label" for="darkModeSwitch">🌙</label>
        </div>

        <div class="menu-box ms-auto">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div class="menu-list" id="menu">
                <a href="index.html">新規追加</a>
                <a href="breakdown.html">明細一覧</a>
                <a href="summary.html">集計</a>
                <hr style="margin: 5px 0; border-top: 1px solid #ccc;">
                <div class="px-2 pb-2 text-center">
                    <input type="color" id="colorPicker" value="#0d6efd" onchange="changeTheme(this.value)" style="width: 100%; cursor: pointer;">
                    <input type="range" id="opacity" min="0" max="1" step="0.01" value="1" >
                </div>
            </div>
        </div>
    </nav>

    <div class="title">家計簿</div>

    <div class="wrapper">
        <div class="form-card">
            <div class="row g-3">
                <div class="col-md-2">
                    <input id="name" class="form-control" placeholder="内容">
                </div>
                <div class="col-md-2">
                    <input id="money" type="number" class="form-control" placeholder="金額">
                </div>
                <div class="col-md-2">
                    <select id="type" class="form-control">
                        <option value="支出">支出</option>
                        <option value="収入">収入</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <select id="category" class="form-control">
                        <option value="家賃">家賃</option>
                        <option value="食費">食費</option>
                        <option value="交通費">交通費</option>
                        <option value="光熱費">光熱費</option>
                        <option value="日用品">日用品</option>
                        <option value="医療費">医療費</option>
                        <option value="ローン">ローン</option>
                        <option value="交際費">交際費</option>
                        <option value="雑費">雑費</option>
                        <option value="給与">給与</option>
                        <option value="臨時収入">臨時収入</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <input id="date" type="date" class="form-control">
                </div>
                <div class="col-md-2">
                    <input id="memo" class="form-control" placeholder="メモ">
                </div>
            </div>

            <div class="text-center mt-4">
                <button class="btn btn-success" onclick="add()">登録</button>
            </div>
        </div>
    </div>

    <script src="js/common.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
