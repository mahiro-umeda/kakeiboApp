<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        /* ナビバー */
        .navbar {
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* メニュー */
        .menu-box {
            position: relative;
        }

        /* ボタン */
        .menu-btn {
            cursor: pointer;
            color: white;
            padding: 8px 15px;
            border-radius: 10px;
            font-weight: bold;
        }

            .menu-btn:hover {
                background: rgba(255,255,255,0.35);
            }

        /* メニュー本体 */
        .menu-list {
            position: absolute;
            right: 0;
            top: 45px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            min-width: 180px;
            display: none;
        }

            .menu-list a {
                display: block;
                padding: 12px 15px;
                text-decoration: none;
                color: #333;
            }

                .menu-list a:hover {
                    background: #0d6efd;
                    color: white;
                }

        /* タイトル */
        .title {
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            margin-top: 30px;
        }

        /* フォーム中央寄せ */
        .wrapper {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        /* カード */
        .form-card {
            width: 900px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">

        <div class="menu-box ms-auto">
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <div class="menu-list" id="menu">
                <a href="breakdown.html">明細一覧</a>
                <a href="summary.html">集計</a>
            </div>
        </div>
    </nav>

    <!-- タイトル -->
    <div class="title">家計簿</div>

    <!-- フォーム中央 -->
    <div class="wrapper">
        <div class="form-card">

            <div class="row g-3">

                <div class="col-md-2">
                    <input id="name" class="form-control" placeholder="内容">
                </div>

                <div class="col-md-2">
                    <input id="money" type="number" class="form-control" placeholder="金額">
                </div>

                <div class="col-md-2">
                    <select id="type" class="form-control">
                        <option value="収入">収入</option>
                        <option value="支出">支出</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <select id="category" class="form-control">
                        <option value="家賃">家賃</option>
                        <option value="食費">食費</option>
                        <option value="交通費">交通費</option>
                        <option value="光熱費">光熱費</option>
                        <option value="日用品">日用品</option>
                        <option value="医療費">医療費</option>
                        <option value="ローン">ローン</option>
                        <option value="交際費">交際費</option>
                        <option value="雑費">雑費</option>
                        <option value="給与">給与</option>
                        <option value="臨時収入">臨時収入</option>
                    </select>
                </div>

                <div class="col-md-2">
                    <input id="date" type="date" class="form-control">
                </div>

                <div class="col-md-2">
                    <input id="memo" class="form-control" placeholder="メモ">
                </div>

            </div>

            <div class="text-center mt-4">
                <button class="btn btn-success" onclick="add()">登録</button>
            </div>

        </div>
    </div>

    <script>
        async function add() {
            const data = {
                name: document.getElementById("name").value,
                money: Number(document.getElementById("money").value),
                type: document.getElementById("type").value,
                category: document.getElementById("category").value,
                date: document.getElementById("date").value,
                memo: document.getElementById("memo").value
            };

            await fetch("/api/Kakeibo", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("登録完了");
        }

        function toggleMenu() {
            const menu = document.getElementById("menu");
            menu.style.display = (menu.style.display === "block") ? "none" : "block";
        }
    </script>

</body>
</html>
