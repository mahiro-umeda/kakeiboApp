
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>
</head>
<body>
    <h1>家計簿アプリ</h1>

    <!-- 登録用フォーム(必要か分からないけど一応全体くくってます) -->
    <form id="Add">

        <!-- 品名 -->
        <input id="name" placeholder="品名"><br>

        <!-- 金額 -->
        <input id="money" placeholder="金額"><br>

        <!-- 収入or支出 -->
        <select id="type">
            <option value="in">収入</option>
            <option value="out">支出</option>
        </select><br>

        <!-- カテゴリ -->
        <select id="type2">
            <option value="eat">食費</option>
            <option value="living">光熱費</option>
        </select> <br>

        <!-- 日付 -->
        <input type="date" id="date" required> <br>

        <!-- 備考 -->
        <textarea id="memo" placeholder="メモ"></textarea><br>
        <button type="submit">登録する</button>

    </form>
    <script>
        document.getElementById('Add').addEventListener('submit', async (e) => {
            e.preventDefault(); // 画面がリロードされるのを防ぐ

            // 入力された値を取得
            const item = {
                name: document.getElementById('name').value,
                money: parseInt(document.getElementById('money').value),
                type: document.getElementById('type').value,
                category: document.getElementById('type2').value,
                date: document.getElementById('date').value,
                memo: document.getElementById('memo').value
            };

            // C#のAPI（受付係）に送信
            const response = await fetch('/api/kakeibo/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(item)
            });

            if (response.ok) {
                alert("データベースに登録されました！");
                document.getElementById('Add').reset(); // 入力欄を空にする
            } else {
                alert("登録に失敗しました。");
            }
        });
    </script>
</body>
</html>
