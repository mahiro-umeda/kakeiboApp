
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>
</head>
<body>
    <h1>家計簿アプリ</h1>

    <!-- 登録用フォーム(必要か分からないけど一応全体くくってます) -->
    <form id="Add">

        <!-- 品名 -->
        <input id="name" placeholder="品名" required><br>

        <!-- 金額 -->
        <input type="number" id="money" placeholder="金額" required><br>

        <!-- 収入or支出 -->
        <select id="type">
            <option value="in">収入</option>
            <option value="out">支出</option>
        </select><br>

        <!-- カテゴリ -->
        <select id="category">
            <option value="eat">食費</option>
            <option value="living">光熱費</option>
        </select><br>

        <!-- 日付 -->
        <input type="date" id="date" required> <br>

        <!-- 備考 -->
        <textarea id="memo" placeholder="メモ"></textarea><br>
        <button type="submit">登録する</button>

    </form>
    <!-- 検索エリア -->
    <div>
        <select id="searchCategory">
            <option value="">全て</option>
            <option value="eat">食費</option>
            <option value="living">光熱費</option>
        </select>

        <input type="date" id="startDate">
        <input type="date" id="endDate">

        <button onclick="loadList()">検索</button>
    </div>
    <table border="1">
        <thead>
            <tr>
                <th>日付</th>
                <th>品名</th>
                <th>金額</th>
                <th>収入/支出</th>
                <th>カテゴリ</th>
                <th>メモ</th>
            </tr>
        </thead>
        <tbody id="list-body"></tbody>
    </table>
    <script src="kakeiboApp.js"></script>
</body>
</html>
