<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

    <style>
        h1 {
            padding: 30px;
            background-color: rgba(50,50,50,0.5);
            color: white;
            text-align: center;
        }
    </style>

    <div class="container">

        <!-- タイトル -->
        <h1>家計簿アプリ</h1>

        <!-- 見出し（横並び） -->
        <div class="row text-center mt-4 fw-bold">
            <div class="col">日時</div>
            <div class="col">収入</div>
            <div class="col">支出</div>
        </div>

        <!-- ボタン（横並び） -->
        <div class="row text-center mt-4">
            <div class="col">
                <a class="btn btn-success w-100" href="#">収入</a>
            </div>
            <div class="col">
                <a class="btn btn-danger w-100" href="#">支出</a>
            </div>
            <div class="col">
                <a class="btn btn-secondary w-100" href="#">一覧表</a>
            </div>
        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
