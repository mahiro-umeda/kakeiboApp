<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8" />
    <title>家計簿アプリ</title>

    <!--ファビコン-->
    <link rel="icon" type="image/png" href="favicon.png">

    <!--CSS連携-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/setting.css">
    <link rel="stylesheet" href="css/darkmode.css">

    <!-- フォント -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP&display=swap" rel="stylesheet">
</head>

<body>

    <!-- ナビ -->
    <nav class="navbar navbar-dark bg-primary px-3">
        <label class="toggle-button-4">
            <input type="checkbox" id="darkModeSwitch" onchange="toggleDarkMode()" />
        </label>

        <div class="menu-box ms-auto d-flex align-items-center gap-2">

            <!-- ハンバーガー -->
            <div class="menu-btn" onclick="toggleMenu()">☰</div>

            <!-- メニュー -->
            <div class="menu-list" id="menu">
                <a href="index.html">✒新規追加</a>
                <a href="breakdown.html">📄明細一覧</a>
                <a href="summary.html">📊集計</a>
                <a href="setting.html">⚙設定</a>
            </div>

        </div>

    </nav>

    <!--フォントカスタム-->
    <p>フォントカスタム</p>
    <!-- フォント選択 -->
    <select id="fontSelect" class="form-select" style="width:160px;">
        <option value="'Noto Sans JP', sans-serif">標準</option>
        <option value="'Yu Gothic', sans-serif">游ゴシック</option>
        <option value="'MS P Mincho', serif">MS P明朝</option>
        <option value="'MS Gothic', monospace">等幅</option>
    </select>
    <!--カラーカスタム-->
    <div class="color-section mt-4">
        <h6 class="mb-3">パステルカラー</h6>
        <div class="d-flex flex-wrap gap-2 mb-4">
            <button class="theme-btn accent-chip" data-theme="pastelblue" style="border-left: 8px solid #7fbfff;">パステルブルー</button>
            <button class="theme-btn accent-chip" data-theme="pastelgreen" style="border-left: 8px solid #7fff7f;">パステルグリーン</button>
            <button class="theme-btn accent-chip" data-theme="pastelorange" style="border-left: 8px solid #ffbf7f;">パステルオレンジ</button>
            <button class="theme-btn accent-chip" data-theme="pastelpink" style="border-left: 8px solid #ff7fbf;">パステルピンク</button>
            <button class="theme-btn accent-chip" data-theme="pastelred" style="border-left: 8px solid #ff7f7f;">パステルレッド</button>
            <button class="theme-btn accent-chip" data-theme="pastelskyblue" style="border-left: 8px solid #7fffff;">スカイブルー</button>
            <button class="theme-btn accent-chip" data-theme="pastelyellow" style="border-left: 8px solid #ffff7f">イエロー</button>
        </div>

        <h6 class="mb-3">ビビッドカラー</h6>
        <div class="d-flex flex-wrap gap-2">
            <button class="theme-btn accent-chip" data-theme="vividblue" style="border-left: 8px solid #007bff;">ビビッドブルー</button>
            <button class="theme-btn accent-chip" data-theme="vividgreen" style="border-left: 8px solid #28a745;">ビビッドグリーン</button>
            <button class="theme-btn accent-chip" data-theme="vividorange" style="border-left: 8px solid #fd7e14;">ビビッドオレンジ</button>
            <button class="theme-btn accent-chip" data-theme="vividpink" style="border-left: 8px solid #e83e8c;">ビビッドピンク</button>
            <button class="theme-btn accent-chip" data-theme="vividskyblue" style="border-left: 8px solid #17a2b8;">スカイブルー</button>
            <button class="theme-btn accent-chip" data-theme="vividyellow" style="border-left: 8px solid #ffc107;">イエロー</button>
            <button class="theme-btn accent-chip" data-theme="monotone" style="border-left: 8px solid #606060;">モノトーン</button>
        </div>
    </div>

    <!--JS連携-->
    <script src="js/common.js"></script>
    <script src="js/setting.js"></script>

</body>
</html>
